<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--=============== REMIX-ICONS CONTENT.DELIVERY.NETWORK(C.D.N) LINK. ===============-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">

    <!--=============== EXTERNAL C.S.S FILE LINK. ===============-->
    <link rel="stylesheet" href="index.css">

    <title>Delizia | Custom Cakes Bakery | Fresh Handmade Cakes for Every Occasion.</title>
</head>
<body>

    <!--=============== HEADER AND NAVIGATION BAR. ===============-->
    <header id="header" class="header">
        <nav id="navigation-bar" class="nav container">
            <a href="/index.html" id="brand-logo" class="nav__logo">
                <img id="brand-logo-image" class="brand_logo_image_container" src="./RESOURCES/IMAGES/logo.svg" alt="Delizia Logo" title="Delizia" loading="eager">
                <span id="brand-title" class="brand_name" translate="no" title="Delizia">Delizia</span>
            </a>

            <div id="nav-menu" class="nav__menu">
                <ul id="navigation-links" class="nav__list">

                    <li id="first-link-container" class="link__container">
                        <a href="#home" id="home-link" class="nav__link">Home</a>
                    </li>

                    <li id="second-link-container" class="link__container">
                        <a href="#about" id="about-us-link" class="nav__link">About Us</a>
                    </li>

                    <li id="third-link-container" class="link__container">
                        <a href="#product" id="products-link" class="nav__link">Products</a>
                    </li>

                    <li id="fourth-link-container" class="link__container">
                        <a href="#new" id="new-link" class="nav__link">New</a>
                    </li>

                    <li id="fifth-link-container" class="link__container">
                        <a href="#contact" id="contact-link" class="nav__link">Contact</a>
                    </li>

                </ul>

                <!-- CLOSE. -->
                 <button id="nav-close" class="nav__close" title="Close Menu" type="button" aria-label="Close menu">
                    <i id="close-icon" class="ri-close-large-line"></i>
                 </button>

                 <img src="./RESOURCES/IMAGES/leaf-3.png" alt="Leaf" id="third-leaf-image" class="nav__img" loading="eager">

                <!-- TOGGLE. -->
                 <button id="nav-toggle" class="nav__toggle" title="Toggle Menu" type="button" aria-label="Toggle menu">
                    <i id="toggle-icon" class="ri-apps-2-line"></i>
                 </button>

            </div>
        </nav>
    </header>

    <!-- =============== EXTERNAL JAVASCRIPT FILE LINK. =============== -->
    <script src="index.js"></script>
    
</body>
</html>
